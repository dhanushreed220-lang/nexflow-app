  const [step,setStep]=useState(0);

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:4000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}}>

const GanttPage=({projects})=>{
  const today=new Date(); const startDate=new Date("2026-06-01"); const totalDays=122;
  const daysPassed=Math.ceil((today-startDate)/86400000);
  const months=["June","July","August","September"];
  return(
    <div style={{padding:24}}>
      <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:800,color:"#0f172a"}}>📅 Gantt Chart</h2>
      <p style={{margin:"0 0 18px",fontSize:12,color:"#94a3b8"}}>Project timeline — June to September 2026</p>
      <div style={{background:"#fff",borderRadius:20,border:"1px solid #f1f5f9",overflow:"auto"}}>
        <div style={{minWidth:700}}>
          <div style={{display:"grid",gridTemplateColumns:"220px 1fr",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{padding:"12px 18px",fontSize:11,fontWeight:700,color:"#94a3b8",borderRight:"1px solid #f1f5f9"}}>PROJECT</div>
            <div style={{display:"flex"}}>{months.map(m=><div key={m} style={{flex:1,padding:"12px 0",textAlign:"center",fontSize:11,fontWeight:700,color:"#374151",borderRight:"1px solid #f8fafc"}}>{m}</div>)}</div>
          </div>
          {projects.map((p,idx)=>{
            const pStart=new Date(p.status==="completed"?"2026-05-01":"2026-06-01");
            const pEnd=new Date(p.deadline);
            const startOff=Math.max(0,Math.ceil((pStart-startDate)/86400000));
            const endOff=Math.min(totalDays,Math.ceil((pEnd-startDate)/86400000));
            const leftPct=(startOff/totalDays)*100; const widthPct=Math.max(2,((endOff-startOff)/totalDays)*100);
            const pr=P_CFG[p.priority]; const isOver=dLeft(p.deadline)<0;
            const barColor=p.status==="completed"?"#10b981":isOver?"#ef4444":pr.c;
            return<div key={p.id} style={{display:"grid",gridTemplateColumns:"220px 1fr",borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafbff"}}>
              <div style={{padding:"14px 18px",borderRight:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:pr.c,flexShrink:0}}/>
                <div><div style={{fontSize:12,fontWeight:700,color:"#0f172a"}}>{p.name}</div><div style={{fontSize:10,color:"#94a3b8"}}>{p.progress}% done</div></div>
              </div>
              <div style={{position:"relative",height:54,display:"flex",alignItems:"center"}}>
                <div style={{position:"absolute",left:`${Math.max(0,(daysPassed/totalDays)*100)}%`,top:0,bottom:0,width:2,background:"#ef444466",zIndex:2}}/>
                <div style={{position:"absolute",left:`${leftPct}%`,width:`${widthPct}%`,height:26,borderRadius:8,background:barColor,opacity:.85,display:"flex",alignItems:"center",paddingLeft:8,overflow:"hidden",zIndex:1}}>
                  <span style={{fontSize:10,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                </div>
                <div style={{position:"absolute",left:`${leftPct}%`,width:`${widthPct*(p.progress/100)}%`,height:26,borderRadius:8,background:"rgba(255,255,255,.28)",zIndex:1}}/>
              </div>
            </div>;
          })}
        </div>
        <div style={{padding:"10px 18px",borderTop:"1px solid #f1f5f9",fontSize:11,color:"#94a3b8",display:"flex",gap:16,flexWrap:"wrap"}}>
          <span>🔴 Today line</span><span>🟣 Active bar</span><span>🟢 Completed</span><span>⬛ Progress overlay</span>
        </div>
      </div>
    </div>
  );
};

const TimeTrackerPage=({timelog,setTimelog,tasks,projects,users,user})=>{
  const [running,setRunning]=useState(false); const [secs,setSecs]=useState(0); const [selTask,setSelTask]=useState(tasks[0]?.id||null); const [note,setNote]=useState(""); const [showAdd,setShowAdd]=useState(false);
  const [manual,setManual]=useState({tid:tasks[0]?.id||"",hours:"",date:"2026-05-31",note:""});
  const timerRef=useRef(null);
  useEffect(()=>{if(running){timerRef.current=setInterval(()=>setSecs(s=>s+1),1000);}else clearInterval(timerRef.current);return()=>clearInterval(timerRef.current);},[running]);
  const fmt=s=>{const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const sc=s%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;};
  const stopLog=()=>{setRunning(false);if(secs>60){const t=tasks.find(t=>t.id===selTask);const hrs=parseFloat((secs/3600).toFixed(2));setTimelog(prev=>[{id:uid(),uid:user.id,tid:selTask,pid:t?.pid,hours:hrs,date:"2026-05-31",note:note||"Via timer"},...prev]);}setSecs(0);setNote("");};
  const addManual=()=>{if(!manual.tid||!manual.hours)return;const t=tasks.find(t=>t.id===parseInt(manual.tid));setTimelog(prev=>[{id:uid(),uid:user.id,tid:parseInt(manual.tid),pid:t?.pid,hours:parseFloat(manual.hours),date:manual.date,note:manual.note},...prev]);setShowAdd(false);};
  const myLog=timelog.filter(l=>l.uid===user.id); const totalH=myLog.reduce((a,l)=>a+l.hours,0);

            <Sel value={selTask||""} onChange={e=>setSelTask(parseInt(e.target.value))} style={{marginBottom:10,background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)"}}>
              {tasks.map(t=><option key={t.id} value={t.id}>{t.title}</option>)}
            </Sel>
            <Inp value={note} onChange={e=>setNote(e.target.value)} placeholder="Note (optional)" style={{marginBottom:14,background:"rgba(255,255,255,.15)",color:"#fff",border:"1px solid rgba(255,255,255,.3)"}}/>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setRunning(!running)} style={{padding:"11px 26px",borderRadius:12,border:"none",cursor:"pointer",background:running?"#fee2e2":"rgba(255,255,255,.9)",color:running?"#dc2626":"#6366f1",fontWeight:800,fontSize:14,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{running?"⏸ Pause":"▶ Start"}</button>
              {secs>0&&<button onClick={stopLog} style={{padding:"11px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,.4)",cursor:"pointer",background:"transparent",color:"#fff",fontWeight:700,fontSize:13,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Log</button>}
            </div>
          </div>
          <div style={{background:"#fff",border:"1px solid #f1f5f9",borderRadius:18,padding:18}}>
            <h4 style={{margin:"0 0 13px",fontSize:13,fontWeight:700,color:"#0f172a"}}>📊 My Summary</h4>
            {[["Total Logged",`${totalH.toFixed(1)}h`,"#6366f1"],["Entries",`${myLog.length}`,"#0ea5e9"],["Projects",`${[...new Set(myLog.map(l=>l.pid))].length}`,"#10b981"]].map(([l,v,c])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:9}}><span style={{fontSize:12,color:"#64748b"}}>{l}</span><span style={{fontSize:14,fontWeight:800,color:c}}>{v}</span></div>
            ))}
          </div>
          <Btn icon="➕" onClick={()=>setShowAdd(true)}>Log Time Manually</Btn>
        </div>
        <div style={{background:"#fff",border:"1px solid #f1f5f9",borderRadius:18,overflow:"hidden"}}>
          <div style={{padding:"15px 18px",borderBottom:"1px solid #f1f5f9",fontSize:14,fontWeight:700,color:"#0f172a"}}>⏱ Time Log</div>
          <div style={{overflowX:"auto"}}>
            <table style={{minWidth:600}}>
              <thead><tr style={{borderBottom:"1px solid #f1f5f9"}}>{["Member","Task","Project","Hours","Date","Note"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
              <tbody>{timelog.map(l=>{const u=users.find(u=>u.id===l.uid); const t=tasks.find(t=>t.id===l.tid); const p=projects.find(p=>p.id===l.pid);

        </div>

      </Modal>}

  );

const ChatPage=({users,user})=>{
  const [active,setActive]=useState(users.find(u=>u.id!==user.id)?.id);
  const [msgs,setMsgs]=useState({
    [users[1]?.id]:[{from:users[1]?.id,text:"Hey! Did you check the latest API spec?",time:"10:32 AM"},{from:users[0]?.id,text:"Yes! Looks solid. Will review tonight.",time:"10:35 AM"}],
    [users[2]?.id]:[{from:users[2]?.id,text:"Design files are in the shared folder.",time:"9:15 AM"}],
  });
  const [input,setInput]=useState(""); const [showEmoji,setShowEmoji]=useState(false); const endRef=useRef(null);
  const au=users.find(u=>u.id===active); const conv=msgs[active]||[];
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[conv]);
  const send=()=>{if(!input.trim())return;setMsgs(prev=>({...prev,[active]:[...(prev[active]||[]),{from:user.id,text:input,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]}));setInput("");};
  const EMOJIS=["👍","❤️","🔥","✅","😂","🎉","💡","⚠️","🚀","💪"];

    <div style={{padding:24}}>

        <div style={{width:230,borderRight:"1px solid #f1f5f9",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"13px 15px",borderBottom:"1px solid #f1f5f9",fontSize:14,fontWeight:800,color:"#0f172a"}}>💬 Messages</div>
          {users.filter(u=>u.id!==user.id).map(u=><button key={u.id} onClick={()=>setActive(u.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 15px",border:"none",background:active===u.id?"#eef2ff":"transparent",cursor:"pointer",textAlign:"left",borderLeft:active===u.id?"3px solid #6366f1":"3px solid transparent"}}>
            <div style={{position:"relative"}}><Av u={u} sz={36}/><div style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:"50%",background:"#10b981",border:"2px solid #fff"}}/></div>
            <div><div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{u.name}</div><div style={{fontSize:11,color:"#94a3b8"}}>{u.role}</div></div>
          </button>)}
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column"}}>
          <div style={{padding:"12px 17px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:11}}>
            <Av u={au} sz={36}/>
            <div><div style={{fontSize:13,fontWeight:700,color:"#0f172a"}}>{au?.name}</div><div style={{fontSize:11,color:"#10b981",fontWeight:600}}>● Online</div></div>
          </div>
          <div style={{flex:1,padding:"14px 17px",overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
            {conv.map((m,i)=>{const isMe=m.from===user.id; const sender=users.find(u=>u.id===m.from);return<div key={i} style={{display:"flex",gap:9,flexDirection:isMe?"row-reverse":"row"}}>
              <Av u={sender} sz={26}/>
              <div style={{maxWidth:"68%"}}><div style={{background:isMe?"linear-gradient(135deg,#6366f1,#818cf8)":"#f1f5f9",color:isMe?"#fff":"#0f172a",padding:"10px 14px",borderRadius:isMe?"18px 4px 18px 18px":"4px 18px 18px 18px",fontSize:13,lineHeight:1.5}}>{m.text}</div><div style={{fontSize:10,color:"#94a3b8",marginTop:3,textAlign:isMe?"right":"left"}}>{m.time}</div></div>
            </div>;})}
            <div ref={endRef}/>
          </div>
          {showEmoji&&<div style={{padding:"8px 17px",background:"#f8fafc",borderTop:"1px solid #f1f5f9",display:"flex",gap:5,flexWrap:"wrap"}}>{EMOJIS.map(e=><button key={e} onClick={()=>{setInput(i=>i+e);setShowEmoji(false);}} style={{fontSize:20,background:"none",border:"none",cursor:"pointer",borderRadius:8,padding:4}}>{e}</button>)}</div>}

            <button onClick={send} style={{background:"linear-gradient(135deg,#6366f1,#818cf8)",border:"none",borderRadius:11,padding:"10px 15px",cursor:"pointer",fontSize:16}}>📤</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const GoalsPage=({user})=>{
  const [goals,setGoals]=useState(INIT_GOALS);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({title:"",kr1:"",kr2:"",kr3:""});
  const add=()=>{if(!form.title)return;setGoals(prev=>[...prev,{id:uid(),title:form.title,owner:user.id,overall:0,status:"active",krs:[form.kr1,form.kr2,form.kr3].filter(Boolean).map((t,i)=>({id:i+1,text:t,p:0}))}]);setShow(false);};
  const updateKR=(gid,kid,val)=>setGoals(prev=>prev.map(g=>{if(g.id!==gid)return g; const krs=g.krs.map(k=>k.id===kid?{...k,p:val}:k); return{...g,krs,overall:Math.round(krs.reduce((a,k)=>a+k.p,0)/krs.length)};}));
  return(
    <div style={{padding:24}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

        <Btn icon="➕" onClick={()=>setShow(true)}>New Goal</Btn>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {goals.map(g=>{const owner=USERS.find(u=>u.id===g.owner); const gc=g.overall>=75?"#10b981":g.overall>=50?"#f59e0b":"#ef4444"; return<div key={g.id} style={{background:"#fff",borderRadius:18,padding:22,border:"1px solid #f1f5f9",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:13}}>
            <div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><span style={{fontSize:18}}>🎯</span><h3 style={{margin:0,fontSize:15,fontWeight:800,color:"#0f172a"}}>{g.title}</h3></div><div style={{display:"flex",alignItems:"center",gap:7}}><Av u={owner} sz={22}/><span style={{fontSize:11,color:"#64748b"}}>{owner?.name}</span><span style={{fontSize:11,fontWeight:700,color:g.status==="completed"?"#10b981":"#6366f1",background:g.status==="completed"?"#d1fae5":"#eef2ff",padding:"2px 7px",borderRadius:99}}>{g.status}</span></div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:26,fontWeight:900,color:gc,letterSpacing:"-1px"}}>{g.overall}%</div><div style={{fontSize:10,color:"#94a3b8"}}>Overall</div></div>
          </div>
          <Bar value={g.overall} color={gc} h={8}/>
          <div style={{marginTop:15,display:"flex",flexDirection:"column",gap:10}}>
            {g.krs.map(kr=><div key={kr.id} style={{background:"#f8fafc",borderRadius:12,padding:"11px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:12,color:"#374151",fontWeight:600}}>{kr.text}</span><span style={{fontSize:12,fontWeight:700,color:"#6366f1"}}>{kr.p}%</span></div>
              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><Bar value={kr.p} h={5}/></div><input type="range" min={0} max={100} value={kr.p} onChange={e=>updateKR(g.id,kr.id,parseInt(e.target.value))} style={{width:80,accentColor:"#6366f1"}}/></div>
            </div>)}
          </div>
        </div>;})}
      </div>
      {show&&<Modal title="Create Goal (OKR)" onClose={()=>setShow(false)}>
        <FF label="Objective"><Inp value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Launch mobile app in Q3"/></FF>
        <FF label="Key Result 1"><Inp value={form.kr1} onChange={e=>setForm(f=>({...f,kr1:e.target.value}))} placeholder="e.g. 1000 beta users"/></FF>
        <FF label="Key Result 2"><Inp value={form.kr2} onChange={e=>setForm(f=>({...f,kr2:e.target.value}))} placeholder="e.g. App store rating ≥ 4.5"/></FF>
        <FF label="Key Result 3"><Inp value={form.kr3} onChange={e=>setForm(f=>({...f,kr3:e.target.value}))} placeholder="e.g. Zero P1 bugs at launch"/></FF>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><Btn variant="secondary" onClick={()=>setShow(false)}>Cancel</Btn><Btn onClick={add} icon="✅">Create</Btn></div>
      </Modal>}
    </div>
  );
};

/* ══════════════════════════════════════════════════
   FEATURE 2 ── POMODORO FOCUS TIMER
══════════════════════════════════════════════════ */
const PomodoroWidget = () => {
  const [show, setShow] = useState(false);
  const [mode, setMode] = useState("work");   // work | short | long
  const TIMES = { work:25*60, short:5*60, long:15*60 };
  const [secs, setSecs] = useState(TIMES.work);
  const [running, setRunning] = useState(false);
  const [rounds, setRounds] = useState(0);
  const ref = useRef(null);

  useEffect(() => {
    if (running) {
      ref.current = setInterval(() => {
        setSecs(s => {
          if (s <= 1) {
            clearInterval(ref.current);
            setRunning(false);
            setRounds(r => r + 1);
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    } else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [running]);

  const switchMode = m => { setMode(m); setSecs(TIMES[m]); setRunning(false); };
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const pct2 = secs / TIMES[mode] * 100;
  const modeColors = { work:"#ef4444", short:"#10b981", long:"#6366f1" };
  const c = modeColors[mode];
  const circumference = 2 * Math.PI * 45;

  return (
    <>
      <button onClick={() => setShow(!show)} title="Pomodoro Timer" style={{
        position:"fixed", bottom:84, right:24, width:44, height:44,
        borderRadius:"50%", background:"linear-gradient(135deg,#ef4444,#f97316)",
        border:"none", cursor:"pointer", boxShadow:"0 4px 14px rgba(239,68,68,.4)",
        display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, fontSize:20
      }}>🍅</button>

      {show && (
        <div style={{
          position:"fixed", bottom:140, right:14, width:280,
          background:"#fff", borderRadius:20,
          boxShadow:"0 20px 60px rgba(0,0,0,.18)",
          border:"1px solid #f1f5f9", zIndex:300, padding:22, textAlign:"center"
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
            <span style={{ fontSize:14, fontWeight:800, color:"#0f172a" }}>🍅 Pomodoro</span>
            <button onClick={() => setShow(false)} style={{ background:"#f1f5f9", border:"none", borderRadius:8, cursor:"pointer", width:26, height:26, fontSize:12 }}>✕</button>
          </div>
          {/* Mode tabs */}
          <div style={{ display:"flex", gap:4, background:"#f1f5f9", borderRadius:10, padding:3, marginBottom:18 }}>
            {[["work","Work"],["short","Short"],["long","Long"]].map(([k,l]) => (
              <button key={k} onClick={() => switchMode(k)} style={{ flex:1, padding:"5px 0", borderRadius:8, border:"none", cursor:"pointer", background:mode===k?c:"transparent", color:mode===k?"#fff":"#64748b", fontSize:11, fontWeight:700, fontFamily:"'Plus Jakarta Sans',sans-serif", transition:"all .2s" }}>{l}</button>
            ))}
          </div>
          {/* Circle timer */}
          <div style={{ position:"relative", width:110, height:110, margin:"0 auto 16px" }}>
            <svg width={110} height={110} style={{ transform:"rotate(-90deg)" }}>
              <circle cx={55} cy={55} r={45} fill="none" stroke="#f1f5f9" strokeWidth={8}/>
              <circle cx={55} cy={55} r={45} fill="none" stroke={c} strokeWidth={8}
                strokeDasharray={circumference}
                strokeDashoffset={circumference * (1 - pct2/100)}
                strokeLinecap="round" style={{ transition:"stroke-dashoffset .5s" }}/>
            </svg>
            <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>
              <div style={{ fontSize:22, fontWeight:900, color:"#0f172a", letterSpacing:"-1px" }}>{fmt(secs)}</div>
              <div style={{ fontSize:10, color:"#94a3b8", textTransform:"capitalize" }}>{mode}</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:8, justifyContent:"center", marginBottom:12 }}>
            <button onClick={() => setRunning(!running)} style={{ padding:"9px 20px", borderRadius:11, border:"none", cursor:"pointer", background:running?"#fee2e2":"linear-gradient(135deg,"+c+","+c+"cc)", color:running?"#dc2626":"#fff", fontWeight:800, fontSize:13, fontFamily:"'Plus Jakarta Sans',sans-serif" }}>
              {running ? "⏸ Pause" : "▶ Start"}
            </button>
            <button onClick={() => { setSecs(TIMES[mode]); setRunning(false); }} style={{ padding:"9px 14px", borderRadius:11, border:"1.5px solid #e2e8f0", background:"#f8fafc", cursor:"pointer", fontSize:13 }}>↺</button>
          </div>
          <div style={{ fontSize:12, color:"#94a3b8" }}>🍅 <b style={{ color:"#0f172a" }}>{rounds}</b> rounds completed today</div>
        </div>
      )}
    </>
  );
};

/* ══════════════════════════════════════════════════
   FEATURE 7 ── PRIORITY MATRIX (Eisenhower)
══════════════════════════════════════════════════ */
const PriorityMatrixPage = ({ tasks, users, user }) => {
  const myTasks = tasks.filter(t => t.assignee === user.id && t.status !== "done");

  const quadrant = t => {
    const urgent = dLeft(t.due) <= 3;
    const important = t.priority === "critical" || t.priority === "high";
    if (urgent && important)  return "do";
    if (!urgent && important) return "schedule";
    if (urgent && !important) return "delegate";
    return "eliminate";
  };

  const QUADS = {
    do:        { label:"Do First",   emoji:"🔴", desc:"Urgent & Important",     bg:"#fef2f2", bc:"#fecaca", tc:"#dc2626" },
    schedule:  { label:"Schedule",   emoji:"🟡", desc:"Not Urgent & Important",  bg:"#fefce8", bc:"#fde68a", tc:"#d97706" },
    delegate:  { label:"Delegate",   emoji:"🔵", desc:"Urgent & Not Important",  bg:"#eff6ff", bc:"#bfdbfe", tc:"#2563eb" },
    eliminate: { label:"Eliminate",  emoji:"⚪", desc:"Not Urgent & Not Important",bg:"#f8fafc",bc:"#e2e8f0", tc:"#64748b" },
  };

  return (
    <div style={{ padding:24 }}>
      <h2 style={{ margin:"0 0 4px", fontSize:18, fontWeight:800, color:"#0f172a" }}>🎯 Priority Matrix</h2>
      <p style={{ margin:"0 0 22px", fontSize:12, color:"#94a3b8" }}>Eisenhower matrix — your tasks organised by urgency & importance</p>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        {Object.entries(QUADS).map(([qk, qv]) => {
          const qTasks = myTasks.filter(t => quadrant(t) === qk);
          return (
            <div key={qk} style={{ background:qv.bg, borderRadius:18, padding:20, border:`1.5px solid ${qv.bc}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <span style={{ fontSize:22 }}>{qv.emoji}</span>
                <div>
                  <div style={{ fontSize:14, fontWeight:800, color:qv.tc }}>{qv.label}</div>
                  <div style={{ fontSize:11, color:qv.tc+"99" }}>{qv.desc}</div>
                </div>
                <span style={{ marginLeft:"auto", background:qv.bc, color:qv.tc, borderRadius:99, fontSize:12, fontWeight:700, padding:"2px 9px" }}>{qTasks.length}</span>
              </div>
              {qTasks.length === 0 ? (
                <div style={{ textAlign:"center", padding:"20px 0", color:qv.tc+"66", fontSize:12 }}>No tasks here ✓</div>
              ) : (
                qTasks.map(t => (
                  <div key={t.id} style={{ background:"rgba(255,255,255,.7)", borderRadius:11, padding:"10px 13px", marginBottom:8, display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:"#0f172a" }}>{t.title}</div>
                      <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>Due {t.due} · {P_CFG[t.priority]?.label}</div>
                    </div>
                    <span style={{ fontSize:10, color:dLeft(t.due)<0?"#ef4444":"#94a3b8", fontWeight:700 }}>{dLeft(t.due)<0?"Overdue":`${dLeft(t.due)}d`}</span>
                  </div>
                ))
              )}
            </div>
          );
        })}
      </div>
      <p style={{ fontSize:11, color:"#94a3b8", marginTop:14, textAlign:"center" }}>Showing your tasks only. Urgency = due ≤ 3 days. Importance = high or critical priority.</p>
    </div>
  );
};

const FeedbackPage = ({ projects, users, user }) => {
  const [ratings, setRatings] = useState([
    { id:1, pid:1, uid:2, stars:4, comment:"Great collaboration, design system is coming along well!", date:"2026-05-30" },
    { id:2, pid:2, uid:3, stars:3, comment:"Timeline is tight but team is doing their best.", date:"2026-05-29" },

  ]);
  const [show, setShow] = useState(false);
  const [form, setForm] = useState({ pid:projects[0]?.id||1, stars:5, comment:"" });

  const submit = () => {
    if (!form.comment.trim()) return;
    setRatings(prev => [...prev, { id:uid(), ...form, pid:parseInt(form.pid), uid:user.id, date:"2026-06-01" }]);
    setShow(false);
    setForm({ pid:projects[0]?.id||1, stars:5, comment:"" });
  };

  const avgByProject = projects.map(p => {
    const pRatings = ratings.filter(r => r.pid===p.id);
    const avg = pRatings.length ? (pRatings.reduce((a,r) => a+r.stars,0)/pRatings.length).toFixed(1) : null;
    return { ...p, avg, count:pRatings.length };
  }).filter(p => p.avg !== null);

  return (
    <div style={{ padding:24 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
        <div><h2 style={{ margin:"0 0 2px", fontSize:18, fontWeight:800, color:"#0f172a" }}>⭐ Feedback & Ratings</h2><p style={{ margin:0, fontSize:12, color:"#94a3b8" }}>Team ratings and satisfaction scores</p></div>
        <Btn icon="⭐" onClick={() => setShow(true)}>Give Feedback</Btn>
      </div>

      {avgByProject.length > 0 && (
        <div style={{ display:"flex", gap:14, marginBottom:22, flexWrap:"wrap" }}>
          {avgByProject.map(p => (
            <div key={p.id} style={{ flex:1, minWidth:160, background:"#fff", borderRadius:16, padding:"16px 18px", border:"1px solid #f1f5f9", textAlign:"center", boxShadow:"0 1px 4px rgba(0,0,0,.04)" }}>
              <div style={{ fontSize:26, fontWeight:900, color:"#f59e0b", marginBottom:4 }}>{p.avg}</div>
              <div style={{ display:"flex", justifyContent:"center", gap:2, marginBottom:6 }}>
                {[1,2,3,4,5].map(s => <span key={s} style={{ fontSize:14, color:s<=Math.round(parseFloat(p.avg))?"#f59e0b":"#e2e8f0" }}>★</span>)}
              </div>
              <div style={{ fontSize:12, fontWeight:700, color:"#0f172a" }}>{p.name}</div>
              <div style={{ fontSize:11, color:"#94a3b8" }}>{p.count} review{p.count!==1?"s":""}</div>
            </div>
          ))}
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
        {ratings.map(r => {
          const proj = projects.find(p => p.id===r.pid);
          const reviewer = users.find(u => u.id===r.uid);
          return (
            <div key={r.id} style={{ background:"#fff", borderRadius:16, padding:"18px 22px", border:"1px solid #f1f5f9", boxShadow:"0 1px 4px rgba(0,0,0,.04)" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <Av u={reviewer} sz={36}/>
                  <div>
                    <div style={{ fontSize:13, fontWeight:700, color:"#0f172a" }}>{reviewer?.name}</div>
                    <div style={{ fontSize:11, color:"#94a3b8" }}>{r.date} · <span style={{ color:"#6366f1" }}>{proj?.name}</span></div>
                  </div>
                </div>
                <div style={{ display:"flex", gap:2 }}>
                  {[1,2,3,4,5].map(s => <span key={s} style={{ fontSize:18, color:s<=r.stars?"#f59e0b":"#e2e8f0" }}>★</span>)}
                </div>
              </div>
              <p style={{ margin:0, fontSize:13, color:"#374151", lineHeight:1.6, background:"#f8fafc", borderRadius:10, padding:"10px 14px" }}>"{r.comment}"</p>

            </div>
          </FF>
          <FF label="Comment">
            <textarea value={form.comment} onChange={e => setForm(f=>({...f,comment:e.target.value}))} rows={4} placeholder="Share your thoughts about this project…" style={{ width:"100%", padding:"10px 13px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", boxSizing:"border-box", fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"vertical" }}/>

          <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}><Btn variant="secondary" onClick={()=>setShow(false)}>Cancel</Btn><Btn onClick={submit} icon="⭐">Submit</Btn></div>
        </Modal>
      )}
    </div>
  );
};

    leaderboard:["Leaderboard","Team performance ranking"],
    meetings: ["Meeting Notes","Decisions & action items"],
    matrix:   ["Priority Matrix","Eisenhower prioritisation"],
    changelog:["Changelog","Full activity audit trail"],
    feedback: ["Feedback","Team ratings & reviews"],
    settings: ["Settings","Account preferences"],
  };
  const [title,subtitle]=TITLES[tab]||["NexFlow",""];

  const bg   = dark ? "#0f172a" : "#f8fafc";
  const sbg  = dark ? "#1e293b" : "#fff";
  const sbdr = dark ? "#334155" : "#f1f5f9";
  const txt  = dark ? "#f1f5f9" : "#0f172a";

  return(
    <div style={{display:"flex",minHeight:"100vh",background:bg,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      {showTour&&<OnboardingTour onFinish={finishTour}/>}
      {showSearch&&<SearchOverlay projects={projects} tasks={tasks} onClose={()=>setShowSearch(false)} onViewProject={p=>{setSelProject(p);setTab("projects");}}/>}
      {showNotifs&&<><div style={{position:"fixed",inset:0,zIndex:499}} onClick={()=>setShowNotifs(false)}/><NotifsPanel onClose={()=>setShowNotifs(false)}/></>}
      {showShortcuts&&<ShortcutsModal onClose={()=>setShowShortcuts(false)}/>}

      {/* ─── SIDEBAR (inline — uses dark-aware colours) ─── */}
      <div style={{width:collapsed?64:230,minHeight:"100vh",background:sbg,borderRight:`1px solid ${sbdr}`,display:"flex",flexDirection:"column",transition:"width .3s",flexShrink:0,boxShadow:"2px 0 8px rgba(0,0,0,.06)",zIndex:100}}>
        <div style={{padding:collapsed?"16px 0":"16px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${sbdr}`,justifyContent:collapsed?"center":"flex-start"}}>
          <div style={{width:36,height:36,borderRadius:11,background:"linear-gradient(135deg,#6366f1,#818cf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>⚡</div>
          {!collapsed&&<div style={{flex:1}}><div style={{fontWeight:900,fontSize:16,color:txt,letterSpacing:"-0.5px"}}>NexFlow</div><div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>Workspace</div></div>}
          {!collapsed&&<button onClick={()=>setCollapsed(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:16,padding:4}}>✕</button>}
        </div>
        <nav style={{flex:1,padding:"6px 0",overflowY:"auto"}}>
          {visible.map(item=>{
            const isA=tab===item.id;
            return(
              <button key={item.id} onClick={()=>goTab(item.id)} title={collapsed?item.label:undefined} style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:collapsed?"9px 0":"9px 13px",justifyContent:collapsed?"center":"flex-start",background:isA?"linear-gradient(90deg,#eef2ff,#f5f3ff)":"transparent",border:"none",cursor:"pointer",borderLeft:isA?"3px solid #6366f1":"3px solid transparent",transition:"all .15s",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                <span style={{fontSize:16,lineHeight:1}}>{item.icon}</span>
                {!collapsed&&<span style={{fontSize:12,fontWeight:isA?700:500,color:isA?"#6366f1":dark?"#94a3b8":"#64748b"}}>{item.label}</span>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:collapsed?"10px 0":"10px 12px",borderTop:`1px solid ${sbdr}`}}>
          {collapsed
            ?<button onClick={()=>setCollapsed(false)} style={{width:"100%",display:"flex",justifyContent:"center",padding:"8px 0",background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:18}}>☰</button>
            :<div style={{display:"flex",alignItems:"center",gap:8,padding:8,borderRadius:12,background:dark?"#334155":"#f8fafc"}}>
              <Av u={authUser} sz={30}/>
              <div style={{flex:1,overflow:"hidden"}}><div style={{fontSize:12,fontWeight:700,color:txt,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{authUser.name}</div><div style={{fontSize:10,color:"#94a3b8"}}>{authUser.role}</div></div>
              <button onClick={logout} title="Logout" style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:14}}>🚪</button>
            </div>
          }
        </div>
      </div>

      {/* ─── MAIN ─── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {/* Topbar */}
        <div style={{background:sbg,borderBottom:`1px solid ${sbdr}`,padding:"0 22px",height:62,display:"flex",alignItems:"center",gap:14,position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>
          <button onClick={()=>setCollapsed(!collapsed)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:20,padding:6,borderRadius:8}}>☰</button>
          <div style={{flex:1}}><h1 style={{margin:0,fontSize:17,fontWeight:800,color:txt,letterSpacing:"-0.5px"}}>{selProject?selProject.name:title}</h1><p style={{margin:0,fontSize:11,color:"#94a3b8"}}>{selProject?"Project Detail":subtitle}</p></div>
          <button onClick={()=>setShowSearch(true)} style={{display:"flex",alignItems:"center",gap:8,background:dark?"#334155":"#f8fafc",border:`1.5px solid ${dark?"#475569":"#e2e8f0"}`,borderRadius:12,padding:"8px 14px",cursor:"pointer",width:200}} onMouseEnter={e=>e.currentTarget.style.borderColor="#6366f1"} onMouseLeave={e=>e.currentTarget.style.borderColor=dark?"#475569":"#e2e8f0"}>
            <span style={{fontSize:14}}>🔍</span><span style={{fontSize:13,color:"#94a3b8",flex:1,textAlign:"left"}}>Search…</span><kbd style={{fontSize:10,color:"#94a3b8",background:dark?"#475569":"#e2e8f0",padding:"1px 5px",borderRadius:4,fontFamily:"monospace"}}>⌘K</kbd>
          </button>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setDark(!dark)} title={dark?"Light mode":"Dark mode"} style={{background:dark?"#334155":"#f8fafc",border:`1.5px solid ${dark?"#475569":"#e2e8f0"}`,borderRadius:11,padding:"8px 10px",cursor:"pointer",fontSize:15}}>{dark?"☀️":"🌙"}</button>
            <button onClick={()=>setShowShortcuts(true)} style={{background:dark?"#334155":"#f8fafc",border:`1.5px solid ${dark?"#475569":"#e2e8f0"}`,borderRadius:11,padding:"8px 10px",cursor:"pointer",fontSize:15}}>⚡</button>
            <button onClick={()=>setShowNotifs(s=>!s)} style={{background:dark?"#334155":"#f8fafc",border:`1.5px solid ${dark?"#475569":"#e2e8f0"}`,borderRadius:11,padding:"8px 10px",cursor:"pointer",position:"relative",fontSize:15}}>🔔<span style={{position:"absolute",top:4,right:4,width:7,height:7,borderRadius:"50%",background:"#ef4444",border:"2px solid "+sbg}}/></button>
            <Av u={authUser} sz={34}/>
          </div>
        </div>

        {/* Page content */}
        <div style={{flex:1,overflowY:"auto"}}>
          {selProject
            ?<ProjectDetail project={selProject} allTasks={tasks} users={USERS} user={authUser} onBack={()=>setSelProject(null)} setProjects={setProjects} setTasks={setTasks}/>
            :<>
              {tab==="dashboard"  &&<Dashboard projects={projects} tasks={tasks} users={USERS} user={authUser} activity={ACTIVITY} onNewProject={()=>goTab("projects")}/>}
              {tab==="projects"   &&<ProjectsPage projects={projects} setProjects={setProjects} tasks={tasks} users={USERS} user={authUser} onView={setSelProject}/>}
              {tab==="tasks"      &&<TasksPage tasks={tasks} setTasks={setTasks} projects={projects} users={USERS} user={authUser}/>}
              {tab==="sprints"    &&<SprintsPage sprints={sprints} setSprints={setSprints} projects={projects} tasks={tasks} user={authUser}/>}
              {tab==="gantt"      &&<GanttPage projects={projects}/>}
              {tab==="team"       &&<TeamPage users={USERS} projects={projects} tasks={tasks} timelog={timelog}/>}
              {tab==="calendar"   &&<CalendarPage projects={projects} tasks={tasks}/>}
              {tab==="timelog"    &&<TimeTrackerPage timelog={timelog} setTimelog={setTimelog} tasks={tasks} projects={projects} users={USERS} user={authUser}/>}
              {tab==="risks"      &&<RisksPage risks={risks} setRisks={setRisks} projects={projects} user={authUser}/>}
              {tab==="invoices"   &&<InvoicesPage invoices={invoices} setInvoices={setInvoices} projects={projects} user={authUser}/>}
              {tab==="reports"    &&<ReportsPage projects={projects} tasks={tasks} users={USERS}/>}
              {tab==="files"      &&<FilesPage/>}
              {tab==="chat"       &&<ChatPage users={USERS} user={authUser}/>}
              {tab==="goals"      &&<GoalsPage user={authUser}/>}
              {tab==="templates"  &&<TemplatesPage user={authUser} setProjects={setProjects}/>}
              {tab==="leaderboard"&&<LeaderboardPage users={USERS} tasks={tasks} timelog={timelog}/>}
              {tab==="meetings"   &&<MeetingNotesPage projects={projects} users={USERS} user={authUser}/>}
              {tab==="matrix"     &&<PriorityMatrixPage tasks={tasks} users={USERS} user={authUser}/>}
              {tab==="changelog"  &&<ChangelogPage users={USERS}/>}
              {tab==="feedback"   &&<FeedbackPage projects={projects} users={USERS} user={authUser}/>}
              {tab==="settings"   &&<SettingsPage user={authUser}/>}
            </>
          }
        </div>
      </div>

      {/* Floating widgets */}
      <StickyNotes/>
      <PomodoroWidget/>
      <QuickAdd projects={projects} users={USERS} user={authUser} setTasks={setTasks} setProjects={setProjects} onNavigate={goTab}/>
    </div>
  );
}
</script>
</body>
</html>
